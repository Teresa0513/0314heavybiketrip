<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: rgba(22, 22, 22, 0.9);
            --text-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: var(--text-light);
        }

        /* 視差背景延伸設計 */
        .parallax-hero {
            position: relative;
            width: 100%;
            height: 55vh; 
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.5)), url('hero.jpg') no-repeat center center;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .header-wrap {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 15px 20px;
        }

        .header-wrap h1 {
            font-size: 2rem;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0,0,0,1);
        }

        .header-wrap p {
            font-size: 1.1rem;
            color: var(--gold);
            margin: 5px 0 0;
            font-style: italic;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px 80px;
        }

        .day-label {
            font-size: 1.8rem;
            color: var(--gold);
            background: rgba(26, 26, 26, 0.9);
            padding: 12px;
            border-radius: 8px;
            margin-top: 30px;
            border-left: 10px solid var(--gold);
            text-align: center;
        }

        /* 行程卡片：地點與天氣並存 */
        .event-card {
            margin-top: 15px;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap; /* 容納天氣資訊換行 */
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            box-shadow: 2px 0 10px rgba(212, 175, 55, 0.4);
        }

        .place-info {
            flex: 1;
            padding-left: 15px;
        }

        .place-name {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        /* 詳細天氣預測樣式 */
        .weather-detail {
            font-size: 0.9rem;
            color: #d4af37;
            margin-top: 4px;
            display: flex;
            gap: 12px;
            font-weight: normal;
        }

        .weather-detail i {
            margin-right: 4px;
        }

        .nav-link {
            color: var(--gold);
            font-size: 2rem;
            text-decoration: none;
            padding-left: 10px;
        }

        @media (max-width: 768px) {
            .parallax-hero { height: 45vh; background-attachment: scroll; }
            .place-name { font-size: 1.3rem; }
            .day-label { font-size: 1.5rem; }
            .weather-detail { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="parallax-hero">
        <div class="header-wrap">
            <h1>2026 寂寞男人。圓夢杯</h1>
            <p>Ride with Honor. 2026 Round-the-Island</p>
        </div>
    </div>

    <div class="container">
        <div class="day-label">第一天：3/14 (六)</div>
        
        <div class="event-card">
            <div class="place-info">
                <span class="place-name">鳳頂 7-11 集合</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-sun"></i> 晴 22°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 0%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=鳳頂路285號7-11" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <div class="place-info">
                <span class="place-name">大武之心 7-11</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-cloud-sun"></i> 多雲 25°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 10%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=大武之心7-11" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <div class="place-info">
                <span class="place-name" style="color:var(--gold-light);">【午餐】新城老街</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-cloud"></i> 陰 23°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 20%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <div class="place-info">
                <span class="place-name">住宿：羅東幸福 YES 民宿</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-cloud-showers-heavy"></i> 短暫雨 20°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 40%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東幸福YES民宿" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-label">第二天：3/15 (日)</div>

        <div class="event-card">
            <div class="place-info">
                <span class="place-name">坪林茶鄉牌樓</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-cloud"></i> 霧 16°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 30%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <div class="place-info">
                <span class="place-name" style="color:var(--gold-light);">【午餐】桃園莫內咖啡</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-cloud-sun"></i> 多雲 21°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 10%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=桃園莫內咖啡" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <div class="place-info">
                <span class="place-name">通宵日落大道</span>
                <div class="weather-detail">
                    <span><i class="fa-solid fa-sun"></i> 晴 24°C</span>
                    <span><i class="fa-solid fa-droplet"></i> 0%</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道觀景台" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

</body>
</html>
