<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: #111111;
            --text-light: #ffffff;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* 關鍵：延伸背景感 (不切圖) */
        .hero-wrap {
            width: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            aspect-ratio: 16/9;
            object-fit: contain;
            display: block;
        }

        /* 標題區：字體精緻、不重疊 */
        .brand-header {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(to bottom, #000, #0a0a0a);
        }

        .brand-header h1 {
            font-size: 2rem;
            margin: 0;
            color: #fff;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .brand-header p {
            font-size: 1.1rem;
            color: var(--gold);
            margin: 8px 0 15px;
            font-style: italic;
        }

        .tag-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .tag-pill {
            background: rgba(30, 30, 30, 0.95);
            padding: 10px 20px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            font-size: 1.1rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        /* 行程區：全員金條 */
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 15px 80px;
        }

        .day-title {
            font-size: 2rem;
            color: var(--gold);
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 25px;
            border-left: 10px solid var(--gold);
            text-align: center;
        }

        .event-card {
            margin-top: 12px;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        /* 立體金條設定 */
        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            box-shadow: 2px 0 10px rgba(212, 175, 55, 0.4);
        }

        .place-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            padding-left: 15px;
            flex: 1;
        }

        /* 指南針按鈕：縮小精緻化 */
        .nav-link {
            color: var(--gold);
            font-size: 1.8rem;
            text-decoration: none;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .brand-header h1 { font-size: 1.7rem; }
            .place-title { font-size: 1.4rem; }
            .day-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="hero-wrap">
        <img src="hero.jpg" class="hero-img" alt="2026圓夢杯">
    </div>
    
    <div class="brand-header">
        <h1>2026 寂寞男人。圓夢杯</h1>
        <p>Ride or Die. 2026 Round-the-Island</p>
        
        <div class="tag-row">
            <div class="tag-pill"><i class="fa-solid fa-motorcycle"></i> TRIDENT | BMW | KAWASAKI</div>
            <div class="tag-pill"><i class="fa-solid fa-calendar-days"></i> 3/14 (六) 05:30 鳳頂 7-11</div>
        </div>
    </div>

    <div class="container">
        <div class="day-title">第一天：3/14 (六)</div>
        
        <div class="event-card">
            <span class="place-title">鳳頂 7-11 集合</span>
            <a href="https://www.google.com/maps/search/?api=1&query=鳳頂7-11" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">大武之心 7-11</span>
            <a href="https://www.google.com/maps/search/?api=1&query=大武之心7-11" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">光復糖廠 (193縣道)</span>
            <a href="https://www.google.com/maps/search/?api=1&query=光復糖廠" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <span class="place-title" style="color:var(--gold-light);">【午餐】新城老街</span>
            <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">台泥 DAKA 園區</span>
            <a href="https://www.google.com/maps/search/?api=1&query=台泥DAKA園區" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">南方澳豆腐岬</span>
            <a href="https://www.google.com/maps/search/?api=1&query=豆腐岬" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">住宿：幸福 YES 民宿</span>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東幸福YES民宿" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <span class="place-title" style="color:var(--gold-light);">【晚餐】炙火串燒居酒屋</span>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東炙火串燒" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-title">第二天：3/15 (日)</div>

        <div class="event-box" style="display:none;"></div> <div class="event-card">
            <span class="place-title">坪林茶鄉牌樓</span>
            <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">財茂彎 328 喝咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=財茂彎328" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">台北港打卡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=台北港" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">林口水牛坑</span>
            <a href="https://www.google.com/maps/search/?api=1&query=林口水牛坑" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <span class="place-title" style="color:var(--gold-light);">【午餐】桃園莫內咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=新屋莫內咖啡" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">通宵日落大道</span>
            <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-title">回程：口湖休息站</span>
            <a href="https://www.google.com/maps/search/?api=1&query=口湖休息站" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

    <div style="background: #111; padding: 40px 20px; text-align: center; border-top: 2px solid var(--gold);">
        <p style="font-size: 1.4rem; font-style: italic; color: #ccc;">「騎凱旋的不一定是紳士，但一定是回頭率最高的那位。」</p>
    </div>

</body>
</html>
