<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯 - 專業氣象版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: rgba(25, 25, 25, 0.9);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        /* 沉浸式背景延伸感 */
        .hero-parallax {
            width: 100%;
            aspect-ratio: 16 / 9; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, var(--bg-dark) 100%), 
                        url('hero.jpg') no-repeat center center;
            background-size: cover;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 15px 100px;
        }

        .day-label {
            font-size: 1.6rem;
            color: var(--gold);
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 30px;
            border-left: 10px solid var(--gold);
            text-align: center;
        }

        .event-card {
            margin-top: 12px;
            padding: 15px 18px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
        }

        .place-info { flex: 1; padding-left: 12px; }
        .place-name { font-size: 1.4rem; font-weight: bold; display: block; }
        
        /* 專業氣象欄位 */
        .weather-grid {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.85rem;
            color: var(--gold-light);
        }

        .weather-item { display: flex; align-items: center; gap: 5px; }
        .weather-item i { width: 16px; color: var(--gold); }

        .nav-btn { color: var(--gold); font-size: 1.8rem; text-decoration: none; padding-left: 10px; }

        @media (max-width: 768px) { .place-name { font-size: 1.2rem; } }
    </style>
</head>
<body>

    <div class="hero-parallax"></div>
    
    <div style="text-align:center; padding: 20px;">
        <h1 style="margin:0; letter-spacing:2px;">2026 寂寞男人。圓夢杯</h1>
        <p style="color:var(--gold); font-style:italic;">Real-time Ride Conditions</p>
    </div>

    <div class="container">
        <div class="day-label">3/14 (六) 出發行程</div>
        
        <div class="event-card" data-city="Kaohsiung">
            <div class="place-info">
                <span class="place-name">鳳頂 7-11 集合</span>
                <div class="weather-grid" id="weather-kaohsiung">
                    <span class="loading">氣象連線中...</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/鳳頂7-11" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-city="Dawu">
            <div class="place-info">
                <span class="place-name">1. 大武之心 7-11</span>
                <div class="weather-grid" id="weather-dawu">
                    <span class="loading">氣象連線中...</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/大武之心7-11" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-label">3/15 (日) 回程行程</div>

        <div class="event-card" data-city="Pinglin">
            <div class="place-info">
                <span class="place-name">1. 北宜坪林茶鄉牌樓</span>
                <div class="weather-grid" id="weather-pinglin">
                    <span class="loading">氣象連線中...</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/坪林茶鄉牌樓" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
        
        <div class="event-card" data-city="Tongxiao">
            <div class="place-info">
                <span class="place-name">6. 通宵日落大道</span>
                <div class="weather-grid" id="weather-tongxiao">
                    <span class="loading">氣象連線中...</span>
                </div>
            </div>
            <a href="https://www.google.com/maps/search/通宵日落大道" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

    <script>
        const apiKey = '88ab07bdb1492d90271d2146ba5efe95'; 

        async function updateWeather() {
            const cards = document.querySelectorAll('.event-card[data-city]');
            
            for (const card of cards) {
                const city = card.getAttribute('data-city');
                const grid = card.querySelector('.weather-grid');

                try {
                    // 同時獲取即時天氣與預報（獲取降雨機率需要預報資料）
                    const resp = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city},TW&units=metric&appid=${apiKey}&lang=zh_tw&cnt=1`);
                    const data = await resp.json();

                    if (resp.ok) {
                        const w = data.list[0];
                        const temp = Math.round(w.main.temp);
                        const desc = w.weather[0].description;
                        const wind = (w.wind.speed * 3.6).toFixed(1); // 轉為 km/h
                        const pop = Math.round(w.pop * 100); // 降雨機率

                        grid.innerHTML = `
                            <div class="weather-item"><i class="fa-solid fa-temperature-half"></i> 溫度：${temp}°C</div>
                            <div class="weather-item"><i class="fa-solid fa-cloud-rain"></i> 降雨機率：${pop}%</div>
                            <div class="weather-item"><i class="fa-solid fa-wind"></i> 風速：${wind} km/h</div>
                            <div class="weather-item"><i class="fa-solid fa-circle-info"></i> 狀況：${desc}</div>
                        `;
                    }
                } catch (e) {
                    grid.innerHTML = '連線超時';
                }
            }
        }

        window.onload = updateWeather;
    </script>
</body>
</html>
