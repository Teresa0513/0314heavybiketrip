<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯 - 騎乘時段氣象版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: rgba(25, 25, 25, 0.9);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 0;
            line-height: 1.4;
        }

        .hero-parallax {
            width: 100%;
            aspect-ratio: 16 / 9; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, var(--bg-dark) 100%), 
                        url('hero.jpg') no-repeat center center;
            background-size: cover;
        }

        .brand-section {
            text-align: center;
            padding: 10px 15px 20px;
            background: var(--bg-dark);
        }

        .brand-section h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 15px 100px;
        }

        .day-label {
            font-size: 1.6rem;
            color: var(--gold);
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 30px;
            border-left: 10px solid var(--gold);
            text-align: center;
        }

        .event-card {
            margin-top: 12px;
            padding: 15px 18px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
        }

        .place-info { flex: 1; padding-left: 12px; }
        .place-name { font-size: 1.4rem; font-weight: bold; display: block; }
        .note { font-size: 0.9rem; color: #aaa; margin-top: 2px; }
        
        .weather-grid {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.85rem;
            color: var(--gold-light);
        }

        .weather-item { display: flex; align-items: center; gap: 5px; }
        .weather-item i { width: 16px; color: var(--gold); }

        .nav-btn { color: var(--gold); font-size: 1.8rem; text-decoration: none; padding-left: 10px; }
    </style>
</head>
<body>

    <div class="hero-parallax"></div>
    
    <div class="brand-section">
        <h1>2026 寂寞男人。圓夢杯</h1>
        <div style="font-size: 0.8rem; color: var(--gold); margin-top: 5px;">3/14 - 3/15 騎乘時段氣象連線</div>
    </div>

    <div class="container">
        <div class="day-label">3/14 (六) 白天行程氣象</div>
        
        <div class="event-card" data-city="Kaohsiung" data-date="2026-03-14">
            <div class="place-info">
                <span class="place-name">鳳頂 7-11 集合出發</span>
                <div class="weather-grid"><span class="loading">分析 3/14 白天數據...</span></div>
            </div>
            <a href="http://googleusercontent.com/maps.google.com/search?api=1&query=7-ELEVEN鳳頂門市" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-city="Dawu" data-date="2026-03-14">
            <div class="place-info">
                <span class="place-name">大武之心 7-11</span>
                <div class="weather-grid"><span class="loading">分析 3/14 白天數據...</span></div>
            </div>
            <a href="http://googleusercontent.com/maps.google.com/search?api=1&query=7-ELEVEN大武之心門市" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-city="Xincheng" data-date="2026-03-14" style="background: rgba(212,175,55,0.15);">
            <div class="place-info">
                <span class="place-name" style="color:var(--gold-light);">【中餐】新城老街</span>
                <div class="weather-grid"><span class="loading">分析數據...</span></div>
            </div>
            <a href="http://googleusercontent.com/maps.google.com/search?api=1&query=新城老街" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-label">3/15 (日) 白天行程氣象</div>

        <div class="event-card" data-city="Pinglin" data-date="2026-03-15">
            <div class="place-info">
                <span class="place-name">北宜坪林茶鄉牌樓</span>
                <div class="weather-grid"><span class="loading">分析 3/15 白天數據...</span></div>
            </div>
            <a href="http://googleusercontent.com/maps.google.com/search?api=1&query=坪林茶鄉牌樓" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-city="Tongxiao" data-date="2026-03-15">
            <div class="place-info">
                <span class="place-name">通宵日落大道觀景台</span>
                <div class="weather-grid"><span class="loading">分析數據...</span></div>
            </div>
            <a href="http://googleusercontent.com/maps.google.com/search?api=1&query=通宵日落大道觀景台" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

    <script>
        const apiKey = '88ab07bdb1492d90271d2146ba5efe95'; 

        async function updateWeather() {
            const cards = document.querySelectorAll('.event-card[data-city]');
            
            for (const card of cards) {
                const city = card.getAttribute('data-city');
                const targetDate = card.getAttribute('data-date'); // 鎖定日期
                const grid = card.querySelector('.weather-grid');

                try {
                    const resp = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city},TW&units=metric&appid=${apiKey}&lang=zh_tw`);
                    const data = await resp.json();

                    if (resp.ok) {
                        // 篩選出該日期 09:00 - 18:00 的預報 (騎行時段)
                        const rideHours = data.list.filter(item => {
                            const dateObj = new Date(item.dt * 1000);
                            const hours = dateObj.getHours();
                            return item.dt_txt.includes(targetDate) && hours >= 9 && hours <= 18;
                        });

                        // 如果沒找到特定時段(可能太遠)，則抓取該日第一筆
                        const w = rideHours.length > 0 ? rideHours[0] : data.list.find(i => i.dt_txt.includes(targetDate)) || data.list[0];
                        
                        const temp = Math.round(w.main.temp);
                        const feelsLike = Math.round(w.main.feels_like);
                        const desc = w.weather[0].description;
                        const wind = (w.wind.speed * 3.6).toFixed(1); 
                        const pop = Math.round(w.pop * 100); 

                        grid.innerHTML = `
                            <div class="weather-item"><i class="fa-solid fa-temperature-half"></i> 體感：${feelsLike}°C</div>
                            <div class="weather-item"><i class="fa-solid fa-cloud-rain"></i> 降雨機率：${pop}%</div>
                            <div class="weather-item"><i class="fa-solid fa-wind"></i> 風速：${wind} km/h</div>
                            <div class="weather-item"><i class="fa-solid fa-circle-info"></i> 狀況：${desc}</div>
                        `;
                    }
                } catch (e) {
                    grid.innerHTML = '氣象連線逾時';
                }
            }
        }

        window.onload = updateWeather;
    </script>
</body>
</html>
