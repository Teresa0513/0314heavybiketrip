<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人。圓夢杯</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-light: #f1e5ac; --bg-dark: #000; --card-bg: rgba(25, 25, 25, 0.95); }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; padding: 0; }
        .hero-parallax { width: 100%; aspect-ratio: 16 / 9; background: linear-gradient(to bottom, transparent 60%, #000 100%), url('hero.jpg') no-repeat center/cover; }
        .brand-section { text-align: center; padding: 20px; background: #000; }
        .brand-section h1 { font-size: 1.8rem; margin: 0; letter-spacing: 2px; font-weight: 900; }
        .honor-slogan { font-size: 1.1rem; color: var(--gold); font-style: italic; font-weight: bold; margin: 8px 0 15px; }
        .container { max-width: 650px; margin: 0 auto; padding: 0 15px 100px; }
        .day-label { font-size: 1.6rem; color: var(--gold); background: #1a1a1a; padding: 12px; border-radius: 8px; margin-top: 30px; border-left: 10px solid var(--gold); text-align: center; }
        .event-card { margin-top: 12px; padding: 18px; background: var(--card-bg); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; position: relative; border: 1px solid #333; overflow: hidden; }
        .event-card::before { content: ''; position: absolute; left: 0; top: 0; width: 8px; height: 100%; background: linear-gradient(180deg, var(--gold-light), var(--gold)); }
        .place-info { flex: 1; padding-left: 12px; }
        .place-name { font-size: 1.4rem; font-weight: bold; display: block; }
        .weather-grid { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem; color: var(--gold-light); min-height: 40px; }
        .weather-item { display: flex; align-items: center; gap: 5px; }
        .weather-item i { width: 16px; color: var(--gold); }
        .nav-btn { color: var(--gold); font-size: 1.8rem; text-decoration: none; padding-left: 10px; }
    </style>
</head>
<body>

    <div class="hero-parallax"></div>
    <div class="brand-section">
        <h1>2026 寂寞男人。圓夢杯</h1>
        <div class="honor-slogan">Ride with Honor. 2026 Round-the-Island</div>
        <div style="background:rgba(40,40,40,0.9); padding:10px 20px; border:1px solid var(--gold); border-radius:50px; display:inline-block; font-size:0.9rem;">
            TRIDENT | BMW | KAWASAKI
        </div>
    </div>

    <div class="container">
        <div class="day-label">3/14 (六) 高雄 ➔ 宜蘭</div>
        
        <div class="event-card" data-lat="22.5925" data-lon="120.3541" data-date="2026-03-14">
            <div class="place-info"><span class="place-name">鳳頂 7-11 集合出發</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=7-ELEVEN鳳頂門市" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="22.3417" data-lon="120.8944" data-date="2026-03-14">
            <div class="place-info"><span class="place-name">大武之心 7-11</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=7-ELEVEN大武之心門市" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="23.6558" data-lon="121.4219" data-date="2026-03-14">
            <div class="place-info"><span class="place-name">光復糖廠 (193起點)</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=花蓮觀光糖廠" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="24.1281" data-lon="121.6436" data-date="2026-03-14" style="background:rgba(212,175,55,0.1);">
            <div class="place-info"><span class="place-name">【午餐】新城老街</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="24.5847" data-lon="121.8656" data-date="2026-03-14">
            <div class="place-info"><span class="place-name">南方澳豆腐岬風景區</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=豆腐岬風景區" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="24.6750" data-lon="121.7678" data-date="2026-03-14">
            <div class="place-info"><span class="place-name">入住羅東幸福 YES 民宿</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=幸福YES民宿" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-label">3/15 (日) 宜蘭 ➔ 高雄</div>

        <div class="event-card" data-lat="24.9367" data-lon="121.7117" data-date="2026-03-15">
            <div class="place-info"><span class="place-name">北宜坪林茶鄉牌樓</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="25.1100" data-lon="121.3100" data-date="2026-03-15">
            <div class="place-info"><span class="place-name">林口水牛坑</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=水牛坑越野場地" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" data-lat="24.5244" data-lon="120.7022" data-date="2026-03-15">
            <div class="place-info"><span class="place-name">通宵日落大道</span><div class="weather-grid">連線中...</div></div>
            <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道觀景台" class="nav-btn" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

    <script>
        const apiKey = '88ab07bdb1492d90271d2146ba5efe95'; 
        async function updateWeather() {
            const cards = document.querySelectorAll('.event-card[data-lat]');
            for (const card of cards) {
                const lat = card.getAttribute('data-lat');
                const lon = card.getAttribute('data-lon');
                const targetDate = card.getAttribute('data-date');
                const grid = card.querySelector('.weather-grid');

                try {
                    const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}&lang=zh_tw`);
                    const data = await response.json();
                    
                    if (data.list) {
                        const w = data.list.find(item => item.dt_txt.includes(targetDate) && new Date(item.dt * 1000).getHours() >= 9) || data.list[0];
                        grid.innerHTML = `
                            <div class="weather-item"><i class="fa-solid fa-temperature-half"></i> 體感：${Math.round(w.main.feels_like)}°C</div>
                            <div class="weather-item"><i class="fa-solid fa-cloud-rain"></i> 降雨機率：${Math.round(w.pop * 100)}%</div>
                            <div class="weather-item"><i class="fa-solid fa-wind"></i> 風速：${(w.wind.speed * 3.6).toFixed(1)} km/h</div>
                            <div class="weather-item"><i class="fa-solid fa-circle-info"></i> 狀況：${w.weather[0].description}</div>
                        `;
                    } else { grid.innerHTML = 'API 回傳異常'; }
                } catch (e) { grid.innerHTML = '連線超時'; }
            }
        }
        window.onload = updateWeather;
    </script>
</body>
</html>
