<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: #161616;
            --text-light: #ffffff;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.4;
        }

        /* 100% 不裁切圖片區 */
        .hero-banner {
            width: 100%;
            background-color: #000;
            line-height: 0;
        }

        .hero-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 標題區：文字在圖片下方，不遮擋車身 */
        .header-section {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(to bottom, #000, #111);
        }

        .header-section h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #fff;
            letter-spacing: 2px;
        }

        .header-section p {
            font-size: 1.1rem;
            color: var(--gold);
            margin: 8px 0 20px;
            font-style: italic;
        }

        .info-pill {
            background: rgba(40, 40, 40, 0.9);
            padding: 10px 15px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            margin: 0 auto 10px;
            font-size: 1.1rem;
            width: 90%;
            max-width: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* 行程容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px 60px;
        }

        .day-header {
            font-size: 1.8rem;
            color: var(--gold);
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 25px;
            border-left: 10px solid var(--gold);
            text-align: center;
        }

        /* 行程卡片與金條 */
        .event-box {
            margin-top: 15px;
            padding: 18px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .event-box::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
        }

        .place-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            padding-left: 15px;
        }

        /* 改良導航按鈕：大且好按 */
        .nav-link {
            background: var(--gold);
            color: #000 !important;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.5rem;
            transition: 0.2s;
        }

        .nav-link:active {
            transform: scale(0.9);
            background: #fff;
        }

        @media (max-width: 480px) {
            .header-section h1 { font-size: 1.6rem; }
            .place-name { font-size: 1.4rem; }
            .day-header { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="hero-banner">
        <img src="hero.jpg" alt="2026圓夢杯">
    </div>
    
    <div class="header-section">
        <h1>2026 寂寞男人環島圓夢杯</h1>
        <p>「不要等到騎不動了，才後悔沒有出發。」</p>
        <div class="info-pill">
            <i class="fa-solid fa-motorcycle"></i> <b>TRIDENT | BMW | KAWASAKI</b>
        </div>
        <div class="info-pill">
            <i class="fa-solid fa-calendar-days"></i> <b>3/14 (六) 05:30 鳳頂 7-11 出發</b>
        </div>
    </div>

    <div class="container">
        <div class="day-header">第一天：3/14 (六)</div>
        
        <div class="event-box">
            <span class="place-name">鳳頂 7-11 集合</span>
            <a href="https://www.google.com/maps/search/?api=1&query=7-ELEVEN+鳳頂門市" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">大武之心 7-11</span>
            <a href="https://www.google.com/maps/search/?api=1&query=7-ELEVEN+大武之心門市" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">光復糖廠 (193縣道)</span>
            <a href="https://www.google.com/maps/search/?api=1&query=花蓮觀光糖廠" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box" style="background: rgba(212,175,55,0.15);">
            <span class="place-name" style="color:var(--gold-light);">【午餐】新城老街</span>
            <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">台泥 DAKA 園區</span>
            <a href="https://www.google.com/maps/search/?api=1&query=台泥DAKA園區" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">南方澳豆腐岬</span>
            <a href="https://www.google.com/maps/search/?api=1&query=豆腐岬風景區" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">住宿：幸福 YES 民宿</span>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東幸福YES民宿" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box" style="background: rgba(212,175,55,0.15);">
            <span class="place-name" style="color:var(--gold-light);">【晚餐】炙火串燒居酒屋</span>
            <a href="https://www.google.com/maps/search/?api=1&query=炙火串燒居酒屋" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="day-header">第二天：3/15 (日)</div>

        <div class="event-box">
            <span class="place-name">坪林茶鄉牌樓</span>
            <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">財茂彎 328 喝咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=財茂彎-328+coffee" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">台北港打卡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=台北港" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box" style="background: rgba(212,175,55,0.15);">
            <span class="place-name" style="color:var(--gold-light);">【午餐】桃園莫內咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=莫內咖啡" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">通宵日落大道</span>
            <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道觀景台" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>

        <div class="event-box">
            <span class="place-name">口湖休息站</span>
            <a href="https://www.google.com/maps/search/?api=1&query=口湖休息站" class="nav-link" target="_blank"><i class="fa-solid fa-location-arrow"></i></a>
        </div>
    </div>

</body>
</html>
