<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: #111111;
            --text-light: #ffffff;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.4;
        }

        /* 關鍵修正：使用 img 標籤容器，確保 16:9 全圖顯現 */
        .hero-banner {
            width: 100%;
            background-color: #000;
            line-height: 0; /* 移除圖片下方微小空隙 */
        }

        .hero-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 標題區：完全獨立於圖片下方，解決重疊與裁切 */
        .header-section {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(to bottom, #000, #080808);
        }

        .header-section h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #fff;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .header-section p {
            font-size: 1.1rem;
            color: var(--gold);
            margin: 8px 0 20px;
            font-style: italic;
        }

        .info-pill {
            background: rgba(30, 30, 30, 0.95);
            padding: 10px 15px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            margin: 0 auto 10px;
            font-size: 1.1rem;
            width: 90%;
            max-width: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* 行程區：全員金條、字體大且精緻 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px 80px;
        }

        .day-label {
            font-size: 1.8rem;
            color: var(--gold);
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 25px;
            border-left: 10px solid var(--gold);
            text-align: center;
        }

        .event-card {
            margin-top: 15px;
            padding: 18px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        /* 立體金條 */
        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            box-shadow: 2px 0 10px rgba(212, 175, 55, 0.4);
        }

        .place-name {
            font-size: 1.6rem; /* 字體大，方便閱讀 */
            font-weight: bold;
            color: #fff;
            padding-left: 15px;
            flex: 1;
        }

        /* 指南針按鈕：縮小精緻化 */
        .nav-icon {
            color: var(--gold);
            font-size: 1.8rem;
            text-decoration: none;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        @media (max-width: 480px) {
            .header-section h1 { font-size: 1.6rem; }
            .place-name { font-size: 1.4rem; }
            .day-label { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="hero-banner">
        <img src="hero.jpg" alt="圓夢杯主角">
    </div>
    
    <div class="header-section">
        <h1>2026 寂寞男人。圓夢杯</h1>
        <p>Ride or Die. 2026 Round-the-Island</p>
        
        <div class="info-pill">
            <i class="fa-solid fa-motorcycle"></i> <b>TRIDENT | BMW | KAWASAKI</b>
        </div>
        <div class="info-pill">
            <i class="fa-solid fa-calendar-days"></i> <b>3/14 (六) 05:30 鳳頂 7-11</b>
        </div>
    </div>

    <div class="container">
        <div class="day-label">第一天：3/14 (六)</div>
        
        <div class="event-card">
            <span class="place-name">鳳頂 7-11 集合</span>
            <a href="https://www.google.com/maps/search/?api=1&query=鳳頂7-11" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">大武之心 7-11</span>
            <a href="https://www.google.com/maps/search/?api=1&query=大武之心7-11" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">光復糖廠 (193縣道)</span>
            <a href="https://www.google.com/maps/search/?api=1&query=光復糖廠" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <span class="place-name" style="color:var(--gold-light);">【午餐】新城老街</span>
            <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">台泥 DAKA 園區</span>
            <a href="https://www.google.com/maps/search/?api=1&query=台泥DAKA園區" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">南方澳豆腐岬</span>
            <a href="https://www.google.com/maps/search/?api=1&query=豆腐岬" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">住宿：幸福 YES 民宿</span>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東幸福YES民宿" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <span class="place-name" style="color:var(--gold-light);">【晚餐】炙火串燒居酒屋</span>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東炙火串燒" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-label">第二天：3/15 (日)</div>

        <div class="event-card">
            <span class="place-name">坪林茶鄉牌樓</span>
            <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">財茂彎 328 喝咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=財茂彎328" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">台北港打卡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=台北港" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">林口水牛坑</span>
            <a href="https://www.google.com/maps/search/?api=1&query=林口水牛坑" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.1);">
            <span class="place-name" style="color:var(--gold-light);">【午餐】桃園莫內咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=桃園莫內咖啡" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">通宵日落大道</span>
            <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">回程：口湖休息站</span>
            <a href="https://www.google.com/maps/search/?api=1&query=口湖休息站" class="nav-icon" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

    <div style="background: #111; padding: 40px 20px; text-align: center; border-top: 2px solid var(--gold);">
        <p style="font-size: 1.4rem; font-style: italic; color: #ccc;">「凱旋而歸，是騎士唯一的終點。」</p>
    </div>

</body>
</html>
