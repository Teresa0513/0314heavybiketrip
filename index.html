<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: 'Optima', 'PingFang TC', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        /* 主視覺：精品海報感 */
        .hero {
            height: 45vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--dark-bg)), url('hero.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            text-align: center;
            padding-bottom: 30px;
        }

        .hero h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-weight: 900;
        }

        .hero p {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--text-gray);
            margin: 10px 0 0;
            text-transform: uppercase;
        }

        /* 頂部資訊條 */
        .meta-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .meta-item {
            font-size: 0.8rem;
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.05);
        }

        /* 行程容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 20px 80px;
        }

        .day-section {
            margin-top: 40px;
        }

        .day-header {
            font-size: 1.2rem;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            margin-bottom: 25px;
            letter-spacing: 3px;
            padding-bottom: 5px;
        }

        /* 行程卡片：精緻化的核心 */
        .event-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .event-info {
            flex: 1;
        }

        .event-label {
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .location-name {
            font-size: 1.3rem; /* 確保中年友好，大字但優雅 */
            font-weight: 600;
            color: #eee;
        }

        /* 精緻化按鈕：改為圓點圖示按鈕 */
        .nav-btn {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold);
            text-decoration: none;
            transition: all 0.3s;
            margin-left: 15px;
        }

        .nav-btn:active {
            background: var(--gold);
            color: #000;
        }

        /* 手機版適配 */
        @media (max-width: 768px) {
            .hero {
                height: 40vh;
                padding-top: 0;
                background-position: center top;
            }
            .hero h1 { font-size: 1.8rem; }
            .location-name { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>寂寞男人。圓夢杯</h1>
        <p>Ride or Die. 2026 Round-the-Island</p>
        <div class="meta-info">
            <div class="meta-item">TRIDENT 660</div>
            <div class="meta-item">BMW</div>
            <div class="meta-item">Z650RS</div>
        </div>
    </section>

    <div class="container">
        <div class="day-section">
            <div class="day-header">MAR 14 SAT.</div>
            
            <div class="event-card">
                <div class="event-info">
                    <span class="event-label">Departure</span>
                    <span class="location-name">鳳頂 7-11 集合</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=7-11鳳頂門市" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>

            <div class="event-card">
                <div class="event-info">
                    <span class="event-label">Stop 01</span>
                    <span class="location-name">大武之心 7-11</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=大武之心7-11" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>

            <div class="event-card">
                <div class="event-info">
                    <span class="event-label">Stop 02</span>
                    <span class="location-name">光復糖廠 (193縣道)</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=光復糖廠" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>

            <div class="event-card" style="border-left: 4px solid var(--gold);">
                <div class="event-info">
                    <span class="event-label">Lunch</span>
                    <span class="location-name">新城老街</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>

            <div class="event-card" style="background: rgba(212, 175, 55, 0.1);">
                <div class="event-info">
                    <span class="event-label">Stay Over</span>
                    <span class="location-name">羅東幸福 YES 民宿</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=幸福YES民宿" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>
        </div>

        <div class="day-section">
            <div class="day-header">MAR 15 SUN.</div>
            
            <div class="event-card">
                <div class="event-info">
                    <span class="event-label">Mountain Pass</span>
                    <span class="location-name">坪林茶鄉牌樓</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>

            <div class="event-card">
                <div class="event-info">
                    <span class="event-label">Coffee Break</span>
                    <span class="location-name">財茂彎 328</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=財茂彎328" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>

            <div class="event-card">
                <div class="event-info">
                    <span class="event-label">Sunset</span>
                    <span class="location-name">通宵日落大道</span>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道" class="nav-btn" target="_blank">
                    <i class="fa-solid fa-location-arrow"></i>
                </a>
            </div>
        </div>
    </div>

    <footer style="text-align: center; color: #444; font-size: 0.7rem; padding-bottom: 30px; letter-spacing: 2px;">
        © 2026 LONELY MEN MOTORCLUB
    </footer>

</body>
</html>
