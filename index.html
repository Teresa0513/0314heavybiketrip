<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>2026 寂寞男人環島圓夢杯</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --bg-dark: #000000;
            --card-bg: rgba(22, 22, 22, 0.85);
            --text-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* 視差背景延伸設計 */
        .parallax-hero {
            position: relative;
            width: 100%;
            height: 60vh; 
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.4)), url('hero.jpg') no-repeat center center;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .parallax-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        .header-wrap {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 15px 25px;
        }

        .header-wrap h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0,0,0,1);
        }

        .header-wrap p {
            font-size: 1.1rem;
            color: var(--gold);
            margin: 8px 0 0;
            font-style: italic;
        }

        /* 資訊區 */
        .info-pills {
            background-color: var(--bg-dark);
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pill {
            background: rgba(30, 30, 30, 0.95);
            padding: 10px 20px;
            border: 1px solid var(--gold);
            border-radius: 12px;
            font-size: 1.1rem;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px 80px;
        }

        /* 天氣氣溫標籤 */
        .weather-info {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .day-label {
            font-size: 1.8rem;
            color: var(--gold);
            background: rgba(26, 26, 26, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-top: 35px;
            border-left: 10px solid var(--gold);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* 行程卡片：全員立體金條 */
        .event-card {
            margin-top: 15px;
            padding: 18px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            box-shadow: 2px 0 10px rgba(212, 175, 55, 0.4);
        }

        .place-name {
            font-size: 1.5rem;
            font-weight: bold;
            padding-left: 15px;
            flex: 1;
        }

        .nav-link {
            color: var(--gold);
            font-size: 2rem;
            text-decoration: none;
            padding-left: 10px;
        }

        @media (max-width: 768px) {
            .parallax-hero {
                height: 50vh;
                background-attachment: scroll;
            }
            .place-name { font-size: 1.4rem; }
            .day-label { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="parallax-hero">
        <div class="header-wrap">
            <h1>2026 寂寞男人。圓夢杯</h1>
            <p>Ride with Honor. 2026 Round-the-Island</p>
        </div>
    </div>
    
    <div class="info-pills">
        <div class="pill">
            <i class="fa-solid fa-motorcycle"></i> <b>TRIDENT | BMW | KAWASAKI</b>
        </div>
        <div class="pill">
            <i class="fa-solid fa-calendar-days"></i> <b>3/14 (六) 05:30 鳳頂 7-11</b>
        </div>
    </div>

    <div class="container">
        <div class="day-label">
            第一天：3/14 (六)
            <div class="weather-info">
                <span><i class="fa-solid fa-sun"></i> 多雲時晴</span>
                <span><i class="fa-solid fa-temperature-half"></i> 18°C - 26°C</span>
            </div>
        </div>
        
        <div class="event-card">
            <span class="place-name">鳳頂 7-11 集合</span>
            <a href="https://www.google.com/maps/search/?api=1&query=鳳頂路285號7-11" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">大武之心 7-11</span>
            <a href="https://www.google.com/maps/search/?api=1&query=大武之心7-11" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.15);">
            <span class="place-name" style="color:var(--gold-light);">【午餐】新城老街</span>
            <a href="https://www.google.com/maps/search/?api=1&query=新城老街" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">住宿：羅東幸福 YES 民宿</span>
            <a href="https://www.google.com/maps/search/?api=1&query=羅東幸福YES民宿" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="day-label">
            第二天：3/15 (日)
            <div class="weather-info">
                <span><i class="fa-solid fa-cloud"></i> 陰時多雲</span>
                <span><i class="fa-solid fa-temperature-low"></i> 16°C - 22°C</span>
            </div>
        </div>

        <div class="event-card">
            <span class="place-name">坪林茶鄉牌樓</span>
            <a href="https://www.google.com/maps/search/?api=1&query=坪林茶鄉牌樓" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card" style="background: rgba(212,175,55,0.15);">
            <span class="place-name" style="color:var(--gold-light);">【午餐】桃園莫內咖啡</span>
            <a href="https://www.google.com/maps/search/?api=1&query=桃園莫內咖啡" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>

        <div class="event-card">
            <span class="place-name">通宵日落大道</span>
            <a href="https://www.google.com/maps/search/?api=1&query=通宵日落大道觀景台" class="nav-link" target="_blank"><i class="fa-solid fa-compass"></i></a>
        </div>
    </div>

    <div style="background: #111; padding: 40px 20px; text-align: center; border-top: 2px solid var(--gold);">
        <p style="font-size: 1.4rem; font-style: italic; color: #ccc;">「凱旋而歸，是騎士唯一的終點。」</p>
    </div>

</body>
</html>
